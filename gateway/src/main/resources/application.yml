server:
  port: ${GATEWAY_PORT:8080}
  address: ${GATEWAY_ADDRESS}
spring:
  application:
    name: ${GATEWAY_APPLICATION_NAME:gateway}

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

          routes:
            - id: users-service
              uri: http://user-service:8081
              predicates:
                - Path=/users/**

            - id: booking-service
              uri: http://booking-service:8082
              predicates:
                - Path=/booking/**
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:8080"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
                maxAge: 3600
jwt:
  secret: ${JWT_SECRET:your-super-secret-key-at-least-32-characters-long!}
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,env,configprops
logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: DEBUG
    com.microservices_example_app.gateway: DEBUG
    org.springframework.http.server.reactive: INFO
    org.springframework.web.server: INFO