spring.application.name=${USER_APPLICATION_NAME}
server.address=${USER_APPLICATION_ADDRESS}
server.port=${USER_APPLICATION_PORT}


#LOGGING
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG
logging.level.org.springframework.web.servlet.mvc.method=DEBUG
logging.level.com.microservices_example_app.users=TRACE

#PASSWORD HASHING
spring.psw4j.hash.bcrypt.rounds=10
spring.psw4j.hash.bcrypt.minor=b

rate-limit.max-attempts=10
rate-limit.window-seconds=60

#JDBC
spring.datasource.url=${USER_DATASOURCE_URL}
spring.datasource.username=${USER_DATASOURCE_USERNAME}
spring.datasource.password=${USER_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


#HIBERNATE
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
user-service.authentication.reset-password-url=${RESTORE_PASSWORD_URL}

#FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migration=true
spring.flyway.cleanDisabled=false


#KAFKA
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.microservices_example_app.users.event
spring.kafka.consumer.properties.spring.json.use.type.headers=false
topic.authentication=notification.authentication
topic.user-lifecycle=notification.user-lifecycle
topic.booking-events=notification.booking-events
topic.mass-mailing=user.mass-mail
topic.notification.mass-mailing=notification.mass-mailing
topic.forget-password=notification.forget-password


#ADMIN USER PROPERTIES
app.root-admin.username= ${ADMIN_USERNAME}
app.root-admin.email= ${ADMIN_MAIL}
app.root-admin.password= ${ADMIN_PASSWORD}